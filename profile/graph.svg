<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="brandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="compAFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="80" y="30" width="0" height="200">
        <animate attributeName="width" from="0" to="660" dur="2.4s" fill="freeze" begin="0.4s"
                 calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </clipPath>
    <clipPath id="labelClip">
      <rect x="0" y="0" width="800" height="280" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.01s" fill="freeze" begin="2.8s"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad)" rx="10"/>
  <rect width="800" height="280" fill="none" stroke="#30363d" stroke-width="1" rx="10"/>

  <!-- Header row -->
  <text x="80" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#8b949e" letter-spacing="0.3">
    BRAND VISIBILITY IN AI RESPONSES · LAST 8 WEEKS
  </text>

  <!-- Y-axis labels -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="end">
    <text x="72" y="54">100%</text>
    <text x="72" y="96">75%</text>
    <text x="72" y="138">50%</text>
    <text x="72" y="180">25%</text>
    <text x="72" y="222">0%</text>
  </g>

  <!-- Horizontal grid lines -->
  <g stroke="#21262d" stroke-width="1" stroke-dasharray="4,4">
    <line x1="80" y1="50" x2="740" y2="50"/>
    <line x1="80" y1="92" x2="740" y2="92"/>
    <line x1="80" y1="134" x2="740" y2="134"/>
    <line x1="80" y1="176" x2="740" y2="176"/>
  </g>
  <!-- Solid baseline -->
  <line x1="80" y1="218" x2="740" y2="218" stroke="#30363d" stroke-width="1"/>
  <!-- Left axis -->
  <line x1="80" y1="50" x2="80" y2="218" stroke="#30363d" stroke-width="1"/>

  <!-- Vertical guide lines (subtle) -->
  <g stroke="#21262d" stroke-width="0.5">
    <line x1="174" y1="50" x2="174" y2="218"/>
    <line x1="268" y1="50" x2="268" y2="218"/>
    <line x1="362" y1="50" x2="362" y2="218"/>
    <line x1="456" y1="50" x2="456" y2="218"/>
    <line x1="550" y1="50" x2="550" y2="218"/>
    <line x1="644" y1="50" x2="644" y2="218"/>
  </g>

  <!-- X-axis labels -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">
    <text x="80"  y="234">W1</text>
    <text x="174" y="234">W2</text>
    <text x="268" y="234">W3</text>
    <text x="362" y="234">W4</text>
    <text x="456" y="234">W5</text>
    <text x="550" y="234">W6</text>
    <text x="644" y="234">W7</text>
    <text x="740" y="234">W8</text>
  </g>

  <!-- ══ DATA PATHS (all clipped to reveal left→right) ══ -->

  <!-- Competitor B area + line (flat, dim) -->
  <g clip-path="url(#chartClip)">
    <path d="M 80,172 L 174,169 L 268,174 L 362,166 L 456,171 L 550,167 L 644,172 L 740,169 L 740,218 L 80,218 Z"
          fill="#58a6ff" fill-opacity="0.04"/>
    <path d="M 80,172 L 174,169 L 268,174 L 362,166 L 456,171 L 550,167 L 644,172 L 740,169"
          fill="none" stroke="#3d444d" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Competitor A area + line (declining, red-dim) -->
  <g clip-path="url(#chartClip)">
    <path d="M 80,121 L 174,127 L 268,116 L 362,130 L 456,137 L 550,141 L 644,148 L 740,152 L 740,218 L 80,218 Z"
          fill="url(#compAFill)"/>
    <path d="M 80,121 L 174,127 L 268,116 L 362,130 L 456,137 L 550,141 L 644,148 L 740,152"
          fill="none" stroke="#6e4040" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Your Brand area fill -->
  <g clip-path="url(#chartClip)">
    <path d="M 80,162 L 174,152 L 268,158 L 362,140 L 456,127 L 550,133 L 644,110 L 740,95 L 740,218 L 80,218 Z"
          fill="url(#brandFill)"/>
  </g>

  <!-- Your Brand line (glowing purple) -->
  <g clip-path="url(#chartClip)" filter="url(#glow)">
    <path d="M 80,162 L 174,152 L 268,158 L 362,140 L 456,127 L 550,133 L 644,110 L 740,95"
          fill="none" stroke="#7c5cfc" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Your Brand data point dots -->
  <g fill="#7c5cfc" filter="url(#glow)">
    <circle cx="80"  cy="162" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="0.55s"/></circle>
    <circle cx="174" cy="152" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="0.85s"/></circle>
    <circle cx="268" cy="158" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="1.15s"/></circle>
    <circle cx="362" cy="140" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="1.45s"/></circle>
    <circle cx="456" cy="127" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="1.75s"/></circle>
    <circle cx="550" cy="133" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="2.05s"/></circle>
    <circle cx="644" cy="110" r="3" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="2.35s"/></circle>
    <circle cx="740" cy="95"  r="4" opacity="0"><animate attributeName="opacity" to="1" dur="0.01s" fill="freeze" begin="2.65s"/></circle>
  </g>

  <!-- Pulsing ring on last brand point -->
  <circle cx="740" cy="95" r="4" fill="none" stroke="#7c5cfc" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite" begin="2.8s"/>
    <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite" begin="2.8s"/>
  </circle>

  <!-- End-of-line value badges -->
  <!-- Your Brand: 71% -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.7s"/>
    <rect x="746" y="83" width="30" height="17" rx="4" fill="#7c5cfc"/>
    <text x="761" y="95" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" font-weight="600" fill="white">71%</text>
  </g>

  <!-- Competitor A: 38% -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.7s"/>
    <text x="746" y="156"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#6e4040">38%</text>
  </g>

  <!-- Competitor B: 30% -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.7s"/>
    <text x="746" y="173"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#484f58">30%</text>
  </g>

  <!-- Stat callout: +39pp -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.0s"/>
    <rect x="80" y="58" width="82" height="26" rx="5" fill="#161b22" stroke="#7c5cfc" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="91" y="69" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#8b949e">8-week change</text>
    <text x="91" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#3fb950">▲ +39 pp</text>
  </g>

  <!-- Legend -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11">
    <!-- Brand -->
    <rect x="80" y="251" width="18" height="3" rx="1.5" fill="#7c5cfc"/>
    <circle cx="89" cy="252.5" r="3" fill="#7c5cfc"/>
    <text x="104" y="256" fill="#c9d1d9">Your Brand</text>
    <!-- Comp A -->
    <rect x="210" y="251" width="18" height="3" rx="1.5" fill="#6e4040"/>
    <text x="234" y="256" fill="#8b949e">Competitor A</text>
    <!-- Comp B -->
    <rect x="340" y="251" width="18" height="3" rx="1.5" fill="#3d444d"/>
    <text x="364" y="256" fill="#8b949e">Competitor B</text>
    <!-- Source note -->
    <text x="740" y="256" text-anchor="end" fill="#484f58" font-size="9">
      ChatGPT · Perplexity · Google AI
    </text>
  </g>
</svg>
